services:

  # ===========================================================================
  # DATABASE LAYER — LOCAL OPTIMIZED: single PostGIS-enabled Postgres instance
  # All 6 logical databases live inside one container → saves ~1.5 GB of RAM.
  # The init.sql script creates the extra databases on first startup.
  #
  # ORIGINAL multi-DB config is commented out at the bottom of this file.
  # To switch back to isolated databases (e.g. for prod-like testing), comment
  # this block out and uncomment the original section.
  # ===========================================================================
  postgres:
    image: postgis/postgis:17-3.5
    container_name: postgres
    environment:
      POSTGRES_DB: rideshare_users       # primary DB — created automatically
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ride-share-network
    healthcheck:
      # Wait until ALL databases are ready, not just the default one
      test: ["CMD-SHELL", "pg_isready -U postgres -d rideshare_users && pg_isready -U postgres -d rideshare_trips && pg_isready -U postgres -d rideshare_locations"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # INFRASTRUCTURE LAYER
  # ===========================================================================
  config-server:
    build:
      context: ./infrastructure/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
    volumes:
      - ./infrastructure/config-server/src/main/resources/config:/config
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  eureka-server:
    build:
      context: ./infrastructure/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gateway-server:
    build:
      context: ./infrastructure/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # MICROSERVICES LAYER
  # All services point to the single 'postgres' container on port 5432.
  # JVM memory is capped at 256 MB per service to stay laptop-friendly.
  # ===========================================================================
  user-service:
    build:
      context: ./microservices/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_users
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  driver-service:
    build:
      context: ./microservices/driver-service
    container_name: driver-service
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_drivers
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  trip-service:
    build:
      context: ./microservices/trip-service
    container_name: trip-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_trips
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  matching-service:
    build:
      context: ./microservices/matching-service/matching-service
    container_name: matching-service
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_matching
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  location-service:
    build:
      context: ./microservices/location-service
    container_name: location-service
    ports:
      - "8085:8085"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_locations
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  notification-service:
    build:
      context: ./microservices/notification-service/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  payment-service:
    build:
      context: ./microservices/payment-service/payment-service
    container_name: payment-service
    ports:
      - "8087:8087"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rideshare_payments
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ride-share-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
volumes:
  postgres-data:   # single volume for the consolidated postgres container

networks:
  ride-share-network:

# docker compose overrides are for docker networking environment where docker
# containers can run with docker environment and without disturbing the
# application's actual local environment settings — run locally, on docker,
# and later for production without changing application code.

