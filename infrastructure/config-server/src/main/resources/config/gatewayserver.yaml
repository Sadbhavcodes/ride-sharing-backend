server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:localDevSecretKeyForRideShareApp_DO_NOT_USE_IN_PROD}
  expiration: 86400000

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: userservice
              uri: lb://USERSERVICE
              predicates:
                - Path=/users/**, /auth/**

            - id: driverservice
              uri: lb://DRIVERSERVICE
              predicates:
                - Path=/drivers/**, /vehicles/**

            - id: tripservice
              uri: lb://TRIPSERVICE
              predicates:
                - Path=/trips/**

            - id: matchingservice
              uri: lb://MATCHINGSERVICE
              predicates:
                - Path=/matching/**

            - id: locationservice
              uri: lb://LOCATIONSERVICE
              predicates:
                - Path=/locations/**

            - id: paymentservice
              uri: lb://PAYMENTSERVICE
              predicates:
                - Path=/payments/**
