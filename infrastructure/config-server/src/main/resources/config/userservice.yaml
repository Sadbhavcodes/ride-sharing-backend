server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rideshare_users
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET:localDevSecretKeyForRideShareApp_DO_NOT_USE_IN_PROD}
  expiration: 86400000
